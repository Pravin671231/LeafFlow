name: leafflow

services:
  mongo:
    image: mongo:8.0
    volumes:
      - mongo_data:/data/db
    networks:
      - leafflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
      target: runner
    environment:
      PORT: "3000"
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/leafflow
    ports:
      - "3000:3000"
    networks:
      - leafflow-net
    depends_on:
      mongo:
        condition: service_healthy

  buyer-app:
    build:
      context: .
      dockerfile: buyer-app/Dockerfile
      target: runner
    environment:
      NODE_ENV: production
    ports:
      - "3001:3000"
    networks:
      - leafflow-net

  admin-app:
    build:
      context: .
      dockerfile: admin-app/Dockerfile
      target: runner
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    networks:
      - leafflow-net

volumes:
  mongo_data:

networks:
  leafflow-net:
    driver: bridge

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # No-cache for HTML shell so browsers always fetch the latest entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite outputs content-hashed filenames under /assets/ — safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA routing: serve index.html for any path that doesn't match a real file
    location / {
        try_files $uri $uri/ /index.html;
    }
}

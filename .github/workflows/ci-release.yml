name: CI Release

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - workspace: backend
            coverage_dir: Backend
          - workspace: buyer-app
            coverage_dir: buyer-app
          - workspace: admin-app
            coverage_dir: admin-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:coverage --workspace=${{ matrix.workspace }}
      - uses: codecov/codecov-action@v4
        with:
          name: coverage-${{ matrix.workspace }}
          directory: ${{ matrix.coverage_dir }}/coverage/
          if-no-files-found: error

  e2e:
    name: E2E
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "E2E placeholder — activated in Issue #62"

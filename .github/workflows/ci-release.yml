name: CI Release

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - workspace: backend
            coverage_dir: Backend
          - workspace: buyer-app
            coverage_dir: buyer-app
          - workspace: admin-app
            coverage_dir: admin-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:coverage --workspace=${{ matrix.workspace }}
      - uses: codecov/codecov-action@v4
        with:
          name: coverage-${{ matrix.workspace }}
          directory: ${{ matrix.coverage_dir }}/coverage/
          if-no-files-found: error

  e2e:
    name: E2E
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start production stack
        run: docker compose -f docker-compose.prod.yml up -d --build
      - name: Wait for backend health
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i/12 — retrying in 5s..."
            sleep 5
          done
          echo "Backend did not become healthy within 60 s" >&2
          exit 1
      - name: E2E placeholder
        run: |
          echo "E2E placeholder — activated in Issue 62"
      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v

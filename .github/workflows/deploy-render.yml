name: Deploy to Render

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy Backend
        run: curl --fail -X POST "${{ secrets.RENDER_DEPLOY_BACKEND }}"

      - name: Deploy Buyer App
        run: curl --fail -X POST "${{ secrets.RENDER_DEPLOY_BUYER }}"

      - name: Deploy Admin App
        run: curl --fail -X POST "${{ secrets.RENDER_DEPLOY_ADMIN }}"

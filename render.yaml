services:
  - type: web
    name: leafflow-backend
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    startCommand: node dist/scripts/seed.js && node dist/index.js
    envVarGroups:
      - leafflow-backend

  - type: web
    name: leafflow-buyer-app
    runtime: docker
    dockerfilePath: ./buyer-app/Dockerfile
    dockerContext: .
    envVarGroups:
      - leafflow-buyer

  - type: web
    name: leafflow-admin-app
    runtime: static
    buildCommand: npm ci && npm run build --workspace admin-app
    staticPublishPath: ./admin-app/dist
    envVarGroups:
      - leafflow-admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
